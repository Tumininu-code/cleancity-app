<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>CleanCity — Map</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    #fullMap { width:100%; height:320px; }
    .map-legend { display:flex; gap:10px; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:#6b7280; font-weight:500; }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  </style>
</head>
<body style="background:#f0f4ee;">
<div class="screen active" style="flex-direction:column;">

  <div class="status-bar"><span>9:41</span><span>Hotspot Map</span><span>&#9679;&#9679;&#9679;</span></div>

  <div class="page-header-row">
    <a href="home.html" class="header-back">&#8592;</a>
    <div><h2>Hotspot Map</h2><p id="mapSubtitle">Lagos State · Live data</p></div>
  </div>

  <div id="fullMap" style="background:#d4e8cc;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;">
      <div style="font-size:28px;">🗺️</div>
      <div style="font-size:13px;color:#1a6b3c;font-weight:600;margin-top:6px;">Loading map...</div>
    </div>
  </div>

  <div class="page-body" style="flex:1;">

    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#e24b4a;"></div>High severity</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef9f27;"></div>Medium severity</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2d9e5f;"></div>Low / Resolved</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;"></div>Your location</div>
    </div>

    <div>
      <div class="section-label">All Active Reports</div>
      <div id="mapReportList">
        <div class="empty-state"><div class="empty-icon">🗺️</div><p>Loading reports...</p></div>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></a>
    <a href="report.html" class="nav-item"><div class="nav-icon">📸</div><div class="nav-label">Report</div></a>
    <a href="map.html" class="nav-item active"><div class="nav-icon">🗺️</div><div class="nav-label">Map</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile</div></a>
  </nav>

</div>

<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
  if (!requireAuth()) {}

  const BACKEND = 'https://cleancity-server.onrender.com';
  var userLat = 6.5244;
  var userLng = 3.3792;
  var allReports = [];
  var mapInstance = null;

  // Get location + maps key + reports all together
  async function init() {
    const loc = await getCurrentLocation();
    userLat = loc.lat;
    userLng = loc.lng;

    // Get real address
    try {
      const geoRes = await fetch(`${BACKEND}/geocode?lat=${loc.lat}&lng=${loc.lng}`);
      const geoData = await geoRes.json();
      document.getElementById('mapSubtitle').textContent = (geoData.address || 'Lagos, Nigeria') + ' · Live';
    } catch(e) {}

    // Load reports
    await loadReports();

    // Load maps key from server
    try {
      const keyRes = await fetch(`${BACKEND}/maps-key`);
      const keyData = await keyRes.json();
      if (keyData.key) {
        loadGoogleMaps(keyData.key);
      } else {
        showMapFallback();
      }
    } catch(e) {
      showMapFallback();
    }
  }

  function loadGoogleMaps(apiKey) {
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap`;
    script.async = true;
    script.defer = true;
    document.head.appendChild(script);
  }

  window.initMap = function() {
    mapInstance = new google.maps.Map(document.getElementById('fullMap'), {
      center: { lat: userLat, lng: userLng },
      zoom: 13,
      styles: [{ featureType: 'poi', stylers: [{ visibility: 'off' }] }]
    });

    // User location marker
    new google.maps.Marker({
      position: { lat: userLat, lng: userLng },
      map: mapInstance,
      title: 'Your location',
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: '#3b82f6',
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 3,
        scale: 10
      }
    });

    // Plot report markers
    const colors = { 'High': '#e24b4a', 'Medium': '#ef9f27', 'Low': '#2d9e5f', 'Resolved': '#2d9e5f' };
    allReports.forEach(r => {
      const lat = r.latitude || (userLat + (Math.random() - 0.5) * 0.05);
      const lng = r.longitude || (userLng + (Math.random() - 0.5) * 0.05);
      const marker = new google.maps.Marker({
        position: { lat, lng },
        map: mapInstance,
        title: r.category,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: colors[r.severity] || '#ef9f27',
          fillOpacity: 0.9,
          strokeColor: '#fff',
          strokeWeight: 2,
          scale: 9
        }
      });
      const infoWindow = new google.maps.InfoWindow({
        content: `<div style="font-family:sans-serif;padding:4px;min-width:140px;">
          <strong style="color:#1a6b3c;">${r.category}</strong><br/>
          <span style="font-size:12px;color:#6b7280;">📍 ${r.location || 'Lagos'}</span><br/>
          <span style="font-size:11px;">${r.severity} severity · ${r.status}</span>
        </div>`
      });
      marker.addListener('click', () => infoWindow.open(mapInstance, marker));
    });
  };

  function showMapFallback() {
    document.getElementById('fullMap').innerHTML = `
      <div style="width:100%;height:100%;background:#d4e8cc;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;">
        <div style="font-size:32px;">🗺️</div>
        <div style="font-size:13px;font-weight:600;color:#1a6b3c;">Map unavailable</div>
        <div style="font-size:11px;color:#6b7280;">Reports listed below</div>
      </div>`;
  }

  async function loadReports() {
    const token = getToken();
    try {
      allReports = await supabase.getReports(token);
      document.getElementById('mapSubtitle').textContent = `Lagos State · ${allReports.length} reports`;

      if (allReports.length === 0) {
        document.getElementById('mapReportList').innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>No active reports. Keep it clean!</p></div>';
        return;
      }

      document.getElementById('mapReportList').innerHTML = allReports.map(r => `
        <div class="report-card">
          <div class="report-card-top">
            <div>
              <div class="report-card-title">${r.category}</div>
              <div class="report-card-id">${timeAgo(r.created_at)}</div>
            </div>
            <span class="badge ${statusBadge(r.status)}">${r.status}</span>
          </div>
          <div class="report-card-bottom" style="margin-top:6px;">
            <div class="report-card-meta">📍 ${r.location || 'Lagos, Nigeria'}</div>
            <span class="badge ${sevBadge(r.severity)}">${r.severity}</span>
          </div>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('mapReportList').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load reports.</p></div>';
    }
  }

  init();
</script>
</body>
</html>
